{% extends 'base.html' %}

{% block title %}E-mail Enviado{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow text-center">
            <div class="card-body p-5">
                <div class="mb-4 text-primary">
                    <i class="bi bi-envelope-check-fill display-1"></i>
                </div>
                <h3 class="card-title mb-3">Verifique seu e-mail</h3>
                <p class="card-text text-muted mb-4">
                    Enviamos instruções para a redefinição de senha para o e-mail informado. 
                    <br>
                    Caso não o encontre, verifique sua caixa de spam.
                </p>
                <a href="{% url 'login' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Voltar para o Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
