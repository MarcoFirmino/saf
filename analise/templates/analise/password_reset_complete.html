{% extends 'base.html' %}

{% block title %}Senha Alterada{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow text-center border-success">
            <div class="card-header bg-success text-white">
                Sucesso!
            </div>
            <div class="card-body p-5">
                <div class="mb-4 text-success">
                    <i class="bi bi-check-circle-fill display-1"></i>
                </div>
                <h3 class="card-title mb-3">Senha alterada com sucesso!</h3>
                <p class="card-text text-muted mb-4">
                    Sua senha foi atualizada. Você já pode acessar o sistema com suas novas credenciais.
                </p>
                
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5">
                    <i class="bi bi-box-arrow-in-right"></i> Ir para o Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
