{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0"><i class="bi bi-file-earmark-excel"></i> Importar Planilha de Créditos</h5>
        </div>
        <div class="card-body">
            <div class="alert alert-info">
                <p class="mb-1"><strong>Atenção:</strong> A planilha deve conter as colunas exatamente com estes nomes:</p>
                <code class="small">DATA, ESTAB, DÉBITOS, CRÉDITO, DNI, CLIENTE, BANCO, EMPRESA</code>
            </div>

            <form method="POST" enctype="multipart/form-data" class="mt-4">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Selecione o arquivo Excel (.xlsx)</label>
                    <input type="file" name="planilha" class="form-control" accept=".xlsx" required>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="{% url 'listar_creditos' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Iniciar Importação</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
