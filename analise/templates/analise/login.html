{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Protege</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="{% static 'analise/style.css' %}">
</head>

<body class="body-login">

    <div class="card card-login shadow-lg p-4 bg-white rounded">
        <div class="text-center mb-4">
            <h1 class="text-primary mb-2"><i class="bi bi-shield-lock-fill"></i></h1>
            <h3 style="color: var(--cor-primaria);">Acesso Restrito</h3>
            <p class="text-muted">Sistema Financeiro Protege</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger py-2 small text-center">
                    <i class="bi bi-exclamation-circle-fill"></i> Usuário ou senha incorretos.
                </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label fw-bold">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Seu usuário" required autofocus>
                </div>
            </div>

            <div class="mb-3"> <label class="form-label fw-bold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Sua senha" required>
                </div>
                
                <div class="text-end mt-2">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none small text-muted hover-primary">
                        Esqueci minha senha
                    </a>
                </div>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-login btn-lg">ENTRAR</button>
            </div>
        </form>
    </div>

    

</body>
</html>
