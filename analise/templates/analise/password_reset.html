
{% load static %}
{% load humanize %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha | Protege</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'analise/style.css' %}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4" style="max-width: 400px; width: 100%;">
        <div class="text-center mb-3">
            <h3 class="text-primary">Recuperar Senha</h3>
            <p class="text-muted small">Informe seu e-mail para receber o link de redefinição.</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">E-mail</label>
                <input type="email" name="email" class="form-control" required placeholder="email@exemplo.com">
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Enviar Link</button>
                <a href="{% url 'login' %}" class="btn btn-outline-secondary">Voltar</a>
            </div>
        </form>
    </div>

</body>
</html>
