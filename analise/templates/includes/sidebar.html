{% load static %}

<button type="button" id="sidebarCollapse" class="btn btn-success shadow-sm toggle-btn">
    <i id="toggleIcon" class="bi bi-chevron-double-left"></i>
</button>

<nav id="sidebar">
    <div class="sidebar-header pt-4">
        <h6 class="mb-0 text-white small text-uppercase" style="letter-spacing: 1px;">Módulos de Análise</h6>
    </div>

    <ul class="list-unstyled components">
        <li class="{% if segmento_ativo == 'resumo' %}active{% endif %}">
            <a href="{% url 'dashboard_resumo' %}">
                <i class="bi bi-speedometer2 me-2"></i> Resumo Gerencial
            </a>
        </li>
        <li class="{% if segmento_ativo == 'renegociados' %}active{% endif %}">
            <a href="{% url 'renegociados' %}">
                <i class="bi bi-arrow-repeat me-2"></i> Renegociações
            </a>
        </li>
        <li><a href="#"><i class="bi bi-box-seam me-2"></i> Aging Pacote</a></li>
        <li><a href="#"><i class="bi bi-briefcase me-2"></i> Negócio</a></li>
        <li><a href="#"><i class="bi bi-building me-2"></i> Empresa</a></li>
        <li class="{% if segmento_ativo == 'aging' %}active{% endif %}">
            <a href="{% url 'dashboard_aging' %}">
                <i class="bi bi-clock-history me-2"></i> Aging
            </a>
        </li>
        <li class="{% if segmento_ativo == 'aging_juridico' %}active{% endif %}">
            <a href="{% url 'aging_juridico' %}">
                <i class="bi bi-gavel me-2"></i> Aging Jurídico
            </a>
        </li>
    </ul>

    {% if user.is_authenticated and user.is_superuser %}
    <div class="sidebar-header pt-4 mt-2 border-top border-secondary opacity-75">
        <h6 class="mb-0 text-warning small text-uppercase" style="letter-spacing: 1px;">
            <i class="bi bi-shield-lock me-1"></i> Administração
        </h6>
    </div>

    <ul class="list-unstyled components">
        <li class="{% if request.resolver_match.url_name == 'gerenciar_resumo' %}active{% endif %}">
            <a href="{% url 'gerenciar_resumo' %}">
                <i class="bi bi-pencil-square me-2 text-warning"></i> Editar Resumo
            </a>
        </li>
        <li class="{% if request.resolver_match.url_name == 'gerenciar_base_geral' %}active{% endif %}">
            <a href="{% url 'gerenciar_base_geral' %}">
                <i class="bi bi-database-fill-gear me-2 text-warning"></i> Editar Base Geral
            </a>
        </li>
    </ul>
    {% endif %}
    </nav>

<script src="{% static 'analise/sidebar.js' %}"></script>
